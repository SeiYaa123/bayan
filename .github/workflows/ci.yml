name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend : tests Python ────────────────────────────────────────────────
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: akashic
          POSTGRES_PASSWORD: akashic
          POSTGRES_DB: akashic_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U akashic"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install fakeredis pytest-cov

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://akashic:akashic@localhost:5432/akashic_test
          REDIS_URL: redis://localhost:6379
          EMBEDDING_MODEL: intfloat/multilingual-e5-large
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=70 -q

  # ── Frontend : type-check + lint ─────────────────────────────────────────
  frontend:
    name: Frontend (tsc + lint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci --passWithNoTests --coverage --coverageThreshold='{"global":{"lines":70}}'

  # ── E2E Playwright ──────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_BASE_URL: http://localhost:3000

      - name: Start server and run E2E tests
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
          npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Build Docker images ──────────────────────────────────────────────────
  docker-build:
    name: Docker build (dry-run)
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t akashic-api:ci apps/api

      - name: Build Web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BASE_URL=https://akashicsearch.com \
            --build-arg NEXT_PUBLIC_API_URL=https://api.akashicsearch.com \
            -t akashic-web:ci apps/web
