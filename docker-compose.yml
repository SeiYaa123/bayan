services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: akashic_postgres
    environment:
      POSTGRES_USER: akashic
      POSTGRES_PASSWORD: akashic
      POSTGRES_DB: akashic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akashic -d akashic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: akashic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: akashic_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://akashic:akashic@postgres:5432/akashic_db
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: "http://localhost:3000,https://akashicsearch.com"
    volumes:
      - model_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    container_name: akashic_web
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  model_cache:
